openapi: 3.0.0
info:
  title: Smart Travel Planner API
  version: 1.0.0
paths:
  /api/v1/language/languages:
    get:
      summary: List supported manual speech and translation languages
      tags:
        - Language
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Supported language options
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  available: true
                  source: libretranslate
                  languages:
                    - id: 6655f6f2b1f1f1f1f1f1f101
                      code: en
                      name: English
                      provider: libretranslate
        '401':
          description: Missing or invalid token
  /api/v1/language/history:
    get:
      summary: List the authenticated user's translation history
      tags:
        - Language
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 10
        - in: query
          name: search
          required: false
          schema:
            type: string
            maxLength: 120
          example: hotel
      responses:
        '200':
          description: User translation history
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  history:
                    items:
                      - id: 6655f6f2b1f1f1f1f1f1f201
                        sourceLanguage:
                          id: 6655f6f2b1f1f1f1f1f1f101
                          code: en
                          name: English
                        targetLanguage:
                          id: 6655f6f2b1f1f1f1f1f1f102
                          code: ja
                          name: Japanese
                        sourceText: Where is my hotel?
                        translatedText: 私のホテルはどこですか？
                        provider: libretranslate
                        cached: false
                        createdAt: '2026-05-28T10:00:00.000Z'
                    pagination:
                      page: 1
                      limit: 10
                      total: 1
                      totalPages: 1
        '401':
          description: Missing or invalid token
  /api/v1/language/history/{id}:
    delete:
      summary: Delete one owned translation history item
      tags:
        - Language
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: 6655f6f2b1f1f1f1f1f1f201
      responses:
        '204':
          description: Translation history deleted
        '401':
          description: Missing or invalid token
        '404':
          description: Translation history not found
  /api/v1/language/translate:
    post:
      summary: Translate travel helper text with LibreTranslate
      tags:
        - Language
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, sourceLanguage, targetLanguage]
              properties:
                text:
                  type: string
                  maxLength: 1000
                sourceLanguage:
                  type: string
                  example: en
                targetLanguage:
                  type: string
                  example: ja
            example:
              text: Where is the nearest train station?
              sourceLanguage: en
              targetLanguage: ja
      responses:
        '200':
          description: Translation result or graceful service fallback
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  translation:
                    available: true
                    sourceLanguage: en
                    targetLanguage: ja
                    originalText: Where is the nearest train station?
                    translatedText: 最寄りの駅はどこですか？
                    cached: false
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many translation requests
  /api/v1/travel-guide/countries:
    get:
      summary: List overseas countries for the travel guide directory
      tags:
        - Travel Guide
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: currentCountry
          required: false
          schema:
            type: string
          example: Malaysia
        - in: query
          name: currentCountryCode
          required: false
          schema:
            type: string
          example: MY
        - in: query
          name: region
          required: false
          schema:
            type: string
            enum: [Asia, Europe, North America, South America, Oceania, Africa, Antarctica, Other]
          example: Asia
        - in: query
          name: search
          required: false
          schema:
            type: string
          example: Japan
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
          example: 24
      responses:
        '200':
          description: Paginated country cards using REST Countries data
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  countries:
                    available: true
                    items:
                      - id: JP
                        name: Japan
                        type: Country
                        region: Asia - Eastern Asia
                        continent: Asia
                        countryCode: JP
                        imageUrl: https://flagcdn.com/w320/jp.png
                        flagUrl: https://flagcdn.com/w320/jp.png
                        currency: JPY
                        coordinates:
                          latitude: 36
                          longitude: 138
                    pagination:
                      page: 1
                      limit: 24
                      total: 50
                      totalPages: 3
                      hasMore: true
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
        '503':
          description: External service unavailable
  /api/v1/travel-guide/destinations:
    get:
      summary: List travel guide destinations or overseas countries
      tags:
        - Travel Guide
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: country
          required: true
          schema:
            type: string
          example: Malaysia
        - in: query
          name: countryCode
          required: false
          schema:
            type: string
          example: MY
        - in: query
          name: mode
          required: false
          schema:
            type: string
            enum: [domestic, overseas]
          example: domestic
        - in: query
          name: search
          required: false
          schema:
            type: string
          example: beach
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 30
          example: 24
      responses:
        '200':
          description: Paginated travel guide destination cards
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  guide:
                    available: true
                    mode: domestic
                    country: Malaysia
                    items:
                      - id: place-1
                        name: Kuala Lumpur
                        type: Tourist attraction
                        rating: 4.6
                        reviewCount: 12000
                        imageUrl: https://example.com/photo.jpg
                    pagination:
                      page: 1
                      limit: 24
                      total: 88
                      totalPages: 4
                      hasMore: true
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
        '503':
          description: External service unavailable
  /api/v1/travel-guide/destination:
    get:
      summary: Get selected destination guide details
      tags:
        - Travel Guide
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: destination
          required: true
          schema:
            type: string
          example: Singapore
        - in: query
          name: country
          required: false
          schema:
            type: string
          example: Singapore
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
          example: '2026-05-25'
        - in: query
          name: latitude
          required: false
          schema:
            type: number
          example: 1.3521
        - in: query
          name: longitude
          required: false
          schema:
            type: number
          example: 103.8198
        - in: query
          name: attractionStart
          required: false
          schema:
            type: integer
            minimum: 0
          example: 0
        - in: query
          name: restaurantStart
          required: false
          schema:
            type: integer
            minimum: 0
          example: 0
        - in: query
          name: hotelStart
          required: false
          schema:
            type: integer
            minimum: 0
          example: 0
      responses:
        '200':
          description: Destination guide details with weather, recommendations, map coordinates, and categorized places
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
        '503':
          description: External service unavailable
  /api/v1/map/places:
    get:
      summary: Search map places with rich Google Maps details
      tags:
        - Map
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          required: true
          schema:
            type: string
            enum: [hotels, airports, train, food, attractions, shopping]
          example: attractions
        - in: query
          name: latitude
          required: true
          schema:
            type: number
          example: 5.4141
        - in: query
          name: longitude
          required: true
          schema:
            type: number
          example: 100.3288
        - in: query
          name: destination
          required: false
          schema:
            type: string
          example: Penang
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 60
          example: 30
      responses:
        '200':
          description: Normalized map places with images, ratings, prices, hours, and coordinates
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  places:
                    available: true
                    category: attractions
                    items:
                      - id: ChIJ123
                        name: Kek Lok Si Temple
                        rating: 4.4
                        reviews: 10482
                        price: Price unavailable
                        hours: Open now
                        imageUrl: https://example.com/photo.jpg
                        address: Air Itam, Penang
                        lat: 5.4001
                        lng: 100.2731
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
        '503':
          description: External map service unavailable
  /api/v1/map/place-details:
    get:
      summary: Get richer details for a selected map place
      tags:
        - Map
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          required: true
          schema:
            type: string
            enum: [hotels, airports, train, food, attractions, shopping]
          example: food
        - in: query
          name: name
          required: true
          schema:
            type: string
          example: Penang Road Famous Teochew Chendul
        - in: query
          name: address
          required: false
          schema:
            type: string
          example: George Town, Penang
      responses:
        '200':
          description: Normalized selected place details
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
  /api/v1/map/weather:
    get:
      summary: Get weather for the selected map place
      tags:
        - Map
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: destination
          required: true
          schema:
            type: string
          example: Kek Lok Si Temple
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
          example: '2026-05-23'
        - in: query
          name: latitude
          required: false
          schema:
            type: number
          example: 5.4001
        - in: query
          name: longitude
          required: false
          schema:
            type: number
          example: 100.2731
        - in: query
          name: locationLabel
          required: false
          schema:
            type: string
          example: Kek Lok Si Temple
      responses:
        '200':
          description: Parsed Open-Meteo forecast for a map place
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
        '503':
          description: Weather service unavailable
  /api/v1/explore/weather:
    get:
      summary: Get destination weather by travel date
      tags:
        - Explore
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: destination
          required: true
          schema:
            type: string
            minLength: 2
          example: Tokyo
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
          example: '2026-06-01'
        - in: query
          name: latitude
          required: false
          schema:
            type: number
            minimum: -90
            maximum: 90
          example: 35.6895
        - in: query
          name: longitude
          required: false
          schema:
            type: number
            minimum: -180
            maximum: 180
          example: 139.6917
        - in: query
          name: locationLabel
          required: false
          schema:
            type: string
          example: Tokyo Tower, Tokyo
      responses:
        '200':
          description: Parsed Open-Meteo destination forecast
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  weather:
                    available: true
                    destination: Tokyo
                    requestedDate: '2026-06-01'
                    forecastType: forecast
                    source: Open-Meteo Forecast
                    location:
                      name: Tokyo
                      label: Tokyo, Japan
                      country: Japan
                      latitude: 35.6895
                      longitude: 139.6917
                      timezone: Asia/Tokyo
                    temperature:
                      min: 21.4
                      max: 27.2
                      mean: 24.1
                      unit: C
                    condition: Light rain
                    icon: cloud-rain
                    precipitation:
                      amountMm: 4.5
                      probability: 65
                    windSpeed:
                      max: 18
                      unit: km/h
                    travelTip: Keep outdoor plans flexible and save a few indoor options.
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
        '503':
          description: External weather service unavailable
  /api/v1/explore/ai-recommendations:
    post:
      summary: Generate AI recommendations from Explore results
      tags:
        - Explore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              view: food
              destination: Penang
              date: '2026-06-01'
              weather:
                available: true
                condition: Light rain
                travelTip: Keep outdoor plans flexible.
              items:
                - name: Penang Road Famous Teochew Chendul
                  category: Dessert shop
                  rating: 4.1
                  reviewCount: 8516
                  price: $$
                  openState: Closed - Opens 9 AM Sat
                  address: George Town, Penang
      responses:
        '200':
          description: Parsed AI recommendations
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  recommendations:
                    available: true
                    summary: Choose the popular dessert stop first, then keep indoor options nearby if rain continues.
                    recommendationMode: ai
                    stats:
                      totalResults: 20
                      averageRating: 4.3
                      openNowCount: 8
                      pricedCount: 12
                      bestValueCount: 5
                    picks:
                      - itemName: Penang Road Famous Teochew Chendul
                        reason: Strong review count and clear price tier.
                        bestFor: dessert stop
                        caution: Check opening time before going.
                        score: 86
                    tips:
                      - Save one nearby indoor dining option.
                    nextActions:
                      - Open the place page to confirm current hours.
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many third-party API requests
        '503':
          description: AI service unavailable
  /api/v1/currency:
    get:
      summary: List supported currencies
      tags:
        - Currency
      responses:
        '200':
          description: Supported currency list
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  currencies:
                    - code: USD
                      label: US Dollar
                    - code: MYR
                      label: Malaysian Ringgit
  /api/v1/currency/convert:
    get:
      summary: Convert an amount with Frankfurter exchange rates
      tags:
        - Currency
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: amount
          required: true
          schema:
            type: number
            minimum: 0
          example: 100
        - in: query
          name: from
          required: true
          schema:
            type: string
          example: USD
        - in: query
          name: to
          required: true
          schema:
            type: string
          example: MYR
      responses:
        '200':
          description: Converted amount
          content:
            application/json:
              example:
                status: success
                message: Success
                data:
                  conversion:
                    available: true
                    base: USD
                    target: MYR
                    rate: 4.72
                    date: '2026-05-18'
                    cached: false
                    amount: 100
                    convertedAmount: 472
        '400':
          description: Validation error
        '401':
          description: Missing or invalid token
        '429':
          description: Too many currency conversion requests
        '502':
          description: External API error
        '503':
          description: External service unavailable
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
