services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: smart-travel-libretranslate
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      LT_HOST: 0.0.0.0
      LT_PORT: 5000
      LT_DISABLE_WEB_UI: "true"
      LT_LOAD_ONLY: ${LIBRETRANSLATE_LOAD_ONLY:-en,ja,zh,ko,ms,id,th,vi,fr,de,es,it,pt,ru,ar,hi}
    volumes:
      - libretranslate-data:/home/libretranslate/.local

volumes:
  libretranslate-data:
